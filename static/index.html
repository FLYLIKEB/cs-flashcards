<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CS 개념 플래시카드</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="apple-touch-icon" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <button id="logoRefreshBtn" class="logo-refresh" type="button" title="새로고침" aria-label="새로고침">CS</button>
      <p id="csvPath" class="muted">CSV 로딩 중...</p>
    </div>
    <div class="header-search" title="검색">
      <span>⌕</span>
      <input id="searchInput" type="search" placeholder="검색" />
    </div>
    <div class="stats" aria-live="polite">
      <button id="filterAllBtn" class="stat-filter active has-tip" type="button" data-status-filter="" title="전체" data-tip="전체">Σ <strong id="statTotal">0</strong></button>
      <button id="filterKnownBtn" class="stat-filter has-tip" type="button" data-status-filter="O" title="안다" data-tip="안다">O <strong id="statKnown">0</strong></button>
      <button id="filterUnknownBtn" class="stat-filter has-tip" type="button" data-status-filter="X" title="모른다" data-tip="모른다">X <strong id="statUnknown">0</strong></button>
      <button id="filterUnreviewedBtn" class="stat-filter has-tip" type="button" data-status-filter="unreviewed" title="미학습" data-tip="미학습">– <strong id="statUnreviewed">0</strong></button>
    </div>
    <div class="header-actions">
      <button id="menuBtn" class="menu-button has-tip" type="button" aria-expanded="false" aria-controls="menuPopover" title="메뉴" data-tip="메뉴">☰</button>
      <div id="menuPopover" class="menu-popover" hidden>
        <button id="memoListBtn" type="button">메모 목록</button>
      </div>
    </div>
  </header>

  <main class="layout">
    <aside id="controlsPanel" class="panel controls">
      <div class="collapsed-quick-actions" aria-label="빠른 자동 듣기">
        <button id="collapsedPlayBtn" class="has-tip collapsed-audio-main" type="button" title="재생" data-tip="자동 듣기 재생">▶</button>
        <button id="collapsedStopBtn" class="has-tip collapsed-audio-main" type="button" title="정지" data-tip="자동 듣기 정지">■</button>
      </div>
      <button id="controlsToggle" class="controls-toggle has-tip" type="button" aria-expanded="true" aria-controls="controlsBody" data-tip="듣기 설정">검색/필터 접기</button>
      <div id="controlsBody" class="controls-body">
      <div class="audio-panel" aria-label="자동 음성 재생 설정">
        <div class="audio-title" title="자동 듣기">▶</div>
        <div class="audio-options">
          <label title="카드명"><input id="speakTerm" type="checkbox" checked /> 앞</label>
          <label title="간단 설명"><input id="speakDefinition" type="checkbox" checked /> 간단</label>
          <label title="상세 설명"><input id="speakDetail" type="checkbox" /> 상세</label>
          <label title="관련 개념"><input id="speakRelated" type="checkbox" /> 관련</label>
          <label title="시험 포인트"><input id="speakExam" type="checkbox" /> 시험</label>
        </div>
        <div class="audio-select-grid">
          <label class="audio-rate-label" title="개념명 재생 범위">개념명
            <select id="termSpeechMode">
              <option value="ko">한글명</option>
              <option value="ko_en">한글+영어</option>
            </select>
          </label>
          <label class="audio-rate-label" title="개념명 반복 횟수">개념 반복
            <select id="termRepeatCount">
              <option value="1">1회</option>
              <option value="2">2회</option>
              <option value="3">3회</option>
              <option value="4">4회</option>
              <option value="5">5회</option>
            </select>
          </label>
          <label class="audio-rate-label" title="카드 하나를 통째로 반복할 횟수">카드 반복
            <select id="cardRepeatCount">
              <option value="1">1회</option>
              <option value="2">2회</option>
              <option value="3">3회</option>
              <option value="4">4회</option>
              <option value="5">5회</option>
            </select>
          </label>
          <label class="audio-rate-label" title="필터된 전체 카드 목록을 끝까지 돈 뒤 다시 반복할 횟수">전체 반복
            <select id="listRepeatCount">
              <option value="1">1바퀴</option>
              <option value="2">2바퀴</option>
              <option value="3">3바퀴</option>
              <option value="4">4바퀴</option>
              <option value="5">5바퀴</option>
              <option value="infinite">무한</option>
            </select>
          </label>
          <label class="audio-rate-label" title="재생 속도">속도
            <select id="speechRate">
              <option value="1">1.0x</option>
              <option value="1.1">1.1x</option>
              <option value="1.2">1.2x</option>
              <option value="1.3">1.3x</option>
              <option value="1.4">1.4x</option>
              <option value="1.5">1.5x</option>
              <option value="1.6">1.6x</option>
              <option value="1.7">1.7x</option>
              <option value="1.8">1.8x</option>
              <option value="1.9">1.9x</option>
              <option value="2">2.0x</option>
            </select>
          </label>
        </div>
        <div id="audioEstimate" class="audio-estimate" aria-live="polite">예상 재생시간 계산 중...</div>
        <div class="audio-buttons">
          <button id="playAudioBtn" class="has-tip" type="button" title="재생" data-tip="자동 듣기 재생">▶</button>
          <button id="stopAudioBtn" class="has-tip" type="button" title="정지" data-tip="자동 듣기 정지">■</button>
        </div>
      </div>

      <p class="hint">Space · ←/→ · ↑/↓ · O/X · Enter 재생/중지 · / 검색 · G 구글</p>
      <p id="message" class="message" role="status"></p>
      </div>
    </aside>

    <section class="study-area">
      <div class="progress-line">
        <label class="position-jump" title="카드 번호 이동">
          <input id="positionInput" type="number" min="1" value="0" />
          <span>/ <span id="positionTotal">0</span></span>
        </label>
        <select id="categorySelect" class="category-filter" title="카테고리">
          <option value="">▦ *</option>
        </select>
        <select id="importanceSelect" class="category-filter" title="중요도">
          <option value="">⭐ *</option>
          <option value="상">⭐⭐⭐</option>
          <option value="중">⭐⭐</option>
          <option value="하">⭐</option>
        </select>
        <select id="difficultySelect" class="category-filter" title="난이도">
          <option value="">▲ *</option>
          <option value="상">▲▲▲</option>
          <option value="중">▲▲</option>
          <option value="하">▲</option>
        </select>
        <select id="bokSelect" class="category-filter" title="한국은행 기출 여부">
          <option value="">한은 *</option>
          <option value="O">한은 O</option>
          <option value="-">한은 –</option>
        </select>
        <div class="study-toggles" aria-label="학습 토글">
          <button id="shuffleBtn" class="has-tip study-toggle" type="button" title="랜덤 모드" data-tip="랜덤 모드">↯</button>
        </div>
      </div>

      <article id="card" class="flashcard" tabindex="0" aria-label="플래시카드. 클릭하면 뒤집힙니다.">
        <div class="card-quick-actions" aria-label="카드 빠른 작업">
          <button id="bookmarkBtn" class="card-action bookmark has-tip" type="button" title="북마크" data-tip="북마크" aria-pressed="false">☆</button>
          <button id="copyBookmarksBtn" class="card-action copy-bookmarks has-tip" type="button" title="북마크 개념명 복사" data-tip="북마크 복사">복사</button>
        </div>
        <div class="card-inner">
          <div class="card-face front">
            <div class="badges">
              <span id="frontCategory" class="badge"></span>
              <span id="frontBok" class="badge bok-badge" title="한국은행 기출/면접 출처 포함">한은</span>
              <span id="frontImportance" class="badge rating importance"></span>
              <span id="frontDifficulty" class="badge rating difficulty"></span>
              <span id="frontStatus" class="badge status"></span>
            </div>
            <div class="term-line front-term-line">
              <h2 id="frontTerm">로딩 중...</h2>
              <span class="external-links" aria-label="구글 검색 링크">
                <a id="frontGoogleSearchLink" class="external-link search-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="구글에서 카테고리, 한글명, 영어명으로 검색" title="구글 검색"><svg class="search-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M10.5 4a6.5 6.5 0 0 1 5.16 10.45l3.45 3.44a1 1 0 0 1-1.42 1.42l-3.44-3.45A6.5 6.5 0 1 1 10.5 4Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"/></svg></a>
              </span>
            </div>
            <p id="frontEnglish" class="english"></p>
          </div>
          <div class="card-face back">
            <div class="back-scroll">
              <div class="badges">
                <span id="backCategory" class="badge"></span>
                <span id="backBok" class="badge bok-badge" title="한국은행 기출/면접 출처 포함">한은</span>
                <span id="backImportance" class="badge rating importance"></span>
                <span id="backDifficulty" class="badge rating difficulty"></span>
                <span id="backId" class="badge"></span>
              </div>
              <div class="term-line back-term-line">
                <h2 id="backTerm"></h2>
                <span class="external-links" aria-label="구글 검색 링크">
                  <a id="backGoogleSearchLink" class="external-link search-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="구글에서 카테고리, 한글명, 영어명으로 검색" title="구글 검색"><svg class="search-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M10.5 4a6.5 6.5 0 0 1 5.16 10.45l3.45 3.44a1 1 0 0 1-1.42 1.42l-3.44-3.45A6.5 6.5 0 1 1 10.5 4Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"/></svg></a>
                </span>
              </div>
              <figure id="backConceptImageWrap" class="concept-image-wrap" hidden>
                <img id="backConceptImage" class="concept-image" alt="" loading="lazy" decoding="async" />
              </figure>
              <div class="back-page-toolbar" aria-label="카드 뒷면 페이지 이동">
                <button id="conceptBackBtn" class="concept-return-button" type="button" aria-label="이전 개념 카드와 필터로 돌아가기" title="이전 개념 카드와 필터로 돌아가기" hidden>↩ 이전</button>
                <button id="backPagePrev" class="has-tip" type="button" aria-label="이전 뒷면 페이지" data-tip="윗 페이지">↑</button>
                <span id="backPageText">1 / 2</span>
                <button id="backPageNext" class="has-tip" type="button" aria-label="다음 뒷면 페이지" data-tip="아랫 페이지">↓</button>
              </div>
              <div id="backPageOne" class="back-page active" data-page="1">
                <section>
                  <h3 title="간단 설명">—</h3>
                  <p id="definition"></p>
                </section>
                <section>
                  <h3 title="상세 설명">⋯</h3>
                  <div id="detail" class="detail-grid"></div>
                </section>
                <section>
                  <h3 title="관련 개념">↔</h3>
                  <div id="conceptGraph" class="concept-graph" aria-label="현재 카드와 관련 개념의 연결 그래프"></div>
                </section>
                <div id="related" class="chips hidden-related" aria-hidden="true"></div>
              </div>
              <div id="backPageTwo" class="back-page" data-page="2">
                <details class="source-details" open>
                  <summary title="출처 파일">⌁</summary>
                  <p id="sources" class="small"></p>
                </details>
                <section>
                  <h3 title="시험 포인트">✓</h3>
                  <p id="examNote"></p>
                </section>
                <section class="memo-section">
                  <div class="memo-heading">
                    <h3 title="개인 메모">메모</h3>
                    <span id="memoUpdatedAt" class="small"></span>
                  </div>
                  <textarea id="memoInput" class="memo-input" rows="5" maxlength="20000" placeholder="이 개념에 대한 개인 메모를 적고 저장하세요."></textarea>
                  <div class="memo-actions">
                    <button id="memoSaveBtn" class="memo-save-button" type="button">메모 저장</button>
                  </div>
                </section>
              </div>
            </div>
          </div>
        </div>
      </article>

      <div class="mark-row">
        <button id="knownBtn" class="mark known has-tip" type="button" title="안다" data-tip="안다">O</button>
        <button id="unknownBtn" class="mark unknown has-tip" type="button" title="모른다" data-tip="모른다">X</button>
        <button id="unreviewedBtn" class="mark unreviewed has-tip" type="button" title="미학습으로 되돌리기" data-tip="미학습">–</button>
      </div>
    </section>
  </main>

  <div id="memoListDialog" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="memoListTitle" hidden>
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="memoListTitle">메모 목록</h2>
        <button id="memoListCloseBtn" class="modal-close" type="button" aria-label="메모 목록 닫기">×</button>
      </div>
      <div id="memoListBody" class="memo-list-body"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
