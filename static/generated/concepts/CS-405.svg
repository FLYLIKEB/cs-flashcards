<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">멀티스레딩 개념 이해 이미지</title>
  <desc id="desc">멀티스레딩은 하나의 프로세스나 프로그램이 여러 스레드를 동시에 또는 교대로 실행해 I/O 대기와 계산을 겹치고 자원을 공유하도록 하는 실행 방식입니다.</desc>
