<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">직접 주소 지정 개념 이해 이미지</title>
  <desc id="desc">직접 주소 지정은 명령어의 주소 필드가 피연산자가 저장된 메모리 주소를 직접 나타내는 방식으로, 단순하지만 주소 범위와 재배치 유연성에 제약이 있습니다.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#faf5ff"/>
      <stop offset="1" stop-color="#fffaf0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1d1914" flood-opacity="0.11"/></filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill: #1f2937; }
      .label { font-size: 22px; font-weight: 850; fill: #9333ea; letter-spacing: -0.03em; }
      .term { font-size: 42px; font-weight: 900; letter-spacing: -0.06em; }
      .english { font-size: 18px; font-weight: 740; fill: #64748b; }
      .definition { font-size: 22px; font-weight: 650; letter-spacing: -0.04em; }
      .node { font-size: 20px; font-weight: 860; fill: #9333ea; letter-spacing: -0.04em; }
      .keyword { font-size: 14px; font-weight: 800; fill: #9333ea; letter-spacing: -0.04em; }
    </style>
  </defs>
