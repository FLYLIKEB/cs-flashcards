<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CS 학습 위키</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="apple-touch-icon" href="/static/favicon.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <script defer src="/static/wiki.js"></script>
</head>
<body class="wiki-page-shell">
  <header class="wiki-topbar">
    <div class="wiki-topbar-inner">
      <a class="wiki-logo" href="/wiki" title="학습 위키 홈" aria-label="학습 위키 홈">WIKI</a>
      <div class="wiki-brand">
        <p class="wiki-brand-kicker">온라인 책 형식의 CS 학습 위키</p>
        <h1 id="wikiBookTitle" class="wiki-book-title">불러오는 중...</h1>
      </div>
      <label class="wiki-search" title="문서 검색">
        <span>검색</span>
        <input id="wikiSearchInput" type="search" placeholder="책/문서 제목 검색" />
      </label>
      <div class="wiki-topbar-actions">
        <button id="wikiSidebarToggleBtn" class="header-link wiki-sidebar-toggle" type="button" aria-controls="wikiSidebar" aria-expanded="true">목차 숨기기</button>
        <a class="header-link" href="/">플래시카드</a>
      </div>
    </div>
  </header>

  <main class="wiki-shell">
    <aside id="wikiSidebar" class="wiki-sidebar panel">
      <div class="wiki-sidebar-head">
        <div class="wiki-sidebar-title-row">
          <span class="wiki-sidebar-caption">목차보기</span>
          <a id="wikiBookIntroLink" class="wiki-book-home-link" href="/wiki/page/_book">책 소개</a>
        </div>
        <p id="wikiStatus" class="small muted">목차를 불러오는 중...</p>
      </div>
      <nav id="wikiToc" class="wiki-toc" aria-label="위키 목차"></nav>
    </aside>

    <section class="wiki-main panel">
      <div class="wiki-meta-row">
        <p id="wikiBreadcrumbs" class="small muted"></p>
        <div class="wiki-page-actions">
          <a id="wikiRawLink" class="header-link" href="#" target="_blank" rel="noopener noreferrer">원본 보기</a>
        </div>
      </div>
      <article id="wikiArticle" class="wiki-article" aria-live="polite"></article>
    </section>
  </main>
</body>
</html>
