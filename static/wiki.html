<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CS 학습 위키</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="apple-touch-icon" href="/static/favicon.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <script defer src="/static/wiki.js"></script>
</head>
<body class="wiki-page-shell">
  <header class="wiki-topbar">
    <div class="wiki-topbar-inner">
      <a class="wiki-logo" href="/wiki" title="학습 위키 홈" aria-label="학습 위키 홈">CS Wiki</a>
      <div class="wiki-brand">
        <h1 id="wikiBookTitle" class="wiki-book-title">불러오는 중...</h1>
      </div>
      <div class="wiki-topbar-controls">
        <button id="wikiSearchToggleBtn" class="wiki-search-toggle" type="button" aria-controls="wikiSearch" aria-expanded="false" aria-label="검색 열기" title="검색">⌕</button>
        <a class="wiki-home-link" href="/">플래시카드</a>
      </div>
    </div>
    <div id="wikiSearch" class="wiki-search" hidden aria-hidden="true">
      <input id="wikiSearchInput" type="search" placeholder="책/문서 제목 검색" tabindex="-1" />
    </div>
  </header>

  <main class="wiki-shell">
    <div class="wiki-sidebar-dock">
      <button id="wikiSidebarToggleBtn" class="wiki-sidebar-toggle" type="button" aria-controls="wikiSidebar" aria-expanded="true">목차</button>
    </div>
    <aside id="wikiSidebar" class="wiki-sidebar panel">
      <div class="wiki-sidebar-head">
        <div class="wiki-sidebar-title-row">
          <span class="wiki-sidebar-caption">목차보기</span>
          <a id="wikiBookIntroLink" class="wiki-book-home-link" href="/wiki/page/_book">책 소개</a>
        </div>
        <p id="wikiStatus" class="small muted">목차를 불러오는 중...</p>
      </div>
      <nav id="wikiToc" class="wiki-toc" aria-label="위키 목차"></nav>
    </aside>

    <section class="wiki-main panel">
      <div class="wiki-meta-row">
        <p id="wikiBreadcrumbs" class="small muted"></p>
      </div>
      <section id="wikiLinkedCards" class="wiki-linked-cards" aria-label="연결된 플래시카드" hidden></section>
      <section id="wikiEditorPanel" class="wiki-editor" aria-label="위키 문서 수정" hidden aria-hidden="true">
        <div class="wiki-editor-head">
          <div>
            <strong>문서 수정</strong>
            <p id="wikiEditorSource" class="wiki-editor-source"></p>
          </div>
          <p id="wikiEditorHint" class="wiki-editor-hint">Markdown 원문을 직접 수정합니다.</p>
        </div>
        <textarea id="wikiEditorTextarea" class="wiki-editor-textarea" spellcheck="false" aria-label="위키 문서 원문"></textarea>
        <div class="wiki-editor-actions">
          <button id="wikiEditorCancelBtn" class="header-link" type="button">취소</button>
          <button id="wikiEditorSaveBtn" class="header-link" type="button">저장</button>
        </div>
      </section>
      <article id="wikiArticle" class="wiki-article" aria-live="polite"></article>
      <nav id="wikiPageNav" class="wiki-page-nav" aria-label="문서 이동" hidden></nav>
      <div class="wiki-page-footer">
        <div class="wiki-page-actions">
          <a id="wikiRawLink" class="header-link" href="#" target="_blank" rel="noopener noreferrer">원본 보기</a>
          <button id="wikiEditBtn" class="header-link" type="button" hidden>수정</button>
          <a id="wikiFlashcardLink" class="header-link" href="/" target="_blank" rel="noopener noreferrer" hidden>대표 카드</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
